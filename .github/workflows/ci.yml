name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: 依賴 CVE 掃描（HIGH-1）
        run: npm audit --production --audit-level=moderate

      - name: Run tests
        run: npm run test

      - name: Build check
        run: npm run build
